services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: production
      PORT: 3001
    volumes:
      - server_data:/app/data
      - server_uploads:/app/uploads
    expose:
      - "3001"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${HOST_HTTP_PORT:-8080}:80"

volumes:
  server_data:
  server_uploads:

